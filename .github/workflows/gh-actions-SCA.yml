name: Software composition analysis (SCA)

on:
  push:
    branches:
    - none
  workflow_dispatch:

permissions:
  id-token: write
  contents: read


jobs:
  Build_Publish_Stage:
    runs-on: ubuntu-latest
    name: Build, Publish, and Stage
    steps:
    - uses: actions/checkout@v2
    - name: Run a multi-line script
      run: |
        npm install --global @cyclonedx/cyclonedx-npm
        npm i -g typescript ts-node
        npm install --production --unsafe-perm
        npm dedupe
      shell: bash
    - name: Create BOM
      run: |
        npm install -g @cyclonedx/cyclonedx-npm@latest
        npm run sbom
      shell: bash
    - name: Generate CycloneDX BOM
      run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.7.11:makeAggregateBom

    - name: Verify BOM file exists
      run: |
        pwd
        find . -name "bom.xml" -o -name "*.cdx.xml"
        test -f target/bom.xml

    - name: Upload BOM to Dependency-Track
      env:
        DTRACK_URL: "https://dependency-track-devsecops-${{ secrets.LABINSTANCEID }}"
        DTRACK_API_KEY: ${{ secrets.DTRACKAPIKEY }}
      run: |
        curl --fail --show-error --silent \
          -X POST "${DTRACK_URL}/api/v1/bom" \
          -H "X-API-Key: ${DTRACK_API_KEY}" \
          -F "projectName=DevSecOps" \
          -F "projectVersion=1.0.0" \
          -F "autoCreate=true" \
          -F "bom=@target/bom.xml"
    - name: Upload BOM to Dependency-Track
      run: |
        curl -v -X "POST" "https://dependency-track-devsecops-${{ secrets.LABINSTANCEID }}.azurewebsites.net/api/v1/bom" \
             -H 'Content-Type: multipart/form-data' \
             -H 'X-API-Key: ${{ secrets.DTRACKAPIKEY }}' \
             -F 'project=${{ secrets.DTRACKPROJID }}' \
             -F 'projectname=DevSecOps' \
             -F 'bom=@${{ github.workspace }}/bom.xml'
      continue-on-error: true
    - name: Upload BOM to existing Dependency-Track project
      env:
        DTRACK_URL: "https://dependency-track-devsecops-${{ secrets.LABINSTANCEID }}"
        DTRACK_API_KEY: ${{ secrets.DTRACKAPIKEY }}
        DTRACK_PROJECT_UUID: ${{ secrets.DTRACKPROJID }}
      run: |
        curl --fail --show-error --silent \
          -X POST "${DTRACK_URL}/api/v1/bom" \
          -H "X-API-Key: ${DTRACK_API_KEY}" \
          -F "project=${DTRACK_PROJECT_UUID}" \
          -F "bom=@target/bom.xml"  

                    
